# 翻页机械臂 MCP 服务器 (Cloudflare Worker)

基于 Cloudflare Worker 的 MCP 服务器，用于 AI 语音控制翻页机械臂。

## 架构

```
┌─────────────┐     MCP协议      ┌──────────────────┐     WebSocket     ┌─────────┐
│  AI (小智)   │ ───────────────→ │ Cloudflare Worker │ ←─────────────── │  网页   │
│  (MCP客户端) │                  │   (MCP服务器)    │     /control     │ (BLE)   │
└─────────────┘                  └────────┬─────────┘                  └────┬────┘
                                          │                                 │
                                          │    AI调用page_turn工具          │
                                          │ ─────────────────────────────────→│
                                          │                                 │
                                          │         执行翻页                 │
                                          │ ←─────────────────────────────────┤
                                          │                                 │
                                          │       返回执行结果               │
                                          │ ─────────────────────────────────→│
```

## 功能

- **MCP 端点** (`/mcp`): AI 通过 MCP 协议调用翻页工具
- **控制端点** (`/control`): 网页客户端连接，接收翻页指令
- **静态页面**: 内置简化版控制页面

## 部署

```bash
# 安装依赖
npm install

# 本地开发
npm run dev

# 部署到 Cloudflare
npm run deploy
```

## 使用

1. 部署 Worker 后，访问 `https://your-worker.workers.dev/`
2. 点击连接 Gary Hub 和 HC-02 设备
3. AI 通过 MCP 协议调用 `page_turn` 工具即可控制机械臂

## MCP 工具

| 工具名 | 说明 |
|--------|------|
| `page_turn` | 执行翻页动作 |

## 环境要求

- Node.js 18+
- Cloudflare 账号（部署时）
